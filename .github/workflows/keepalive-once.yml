name: Anyrouter Keepalive (Once)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'API Base URL'
        required: false
        default: 'https://a-ocnfniawgw.cn-shanghai.fcapp.run'
      model:
        description: 'Claude model for health checks'
        required: false
        default: 'opus[1m]'

jobs:
  keepalive-once:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Claude CLI
        run: claude --version

      - name: Run keepalive once for all tokens
        env:
          ANYROUTER_TOKENS: ${{ secrets.ANYROUTER_TOKENS }}
          BASE_URL: ${{ github.event.inputs.base_url || 'https://a-ocnfniawgw.cn-shanghai.fcapp.run' }}
          MODEL: ${{ github.event.inputs.model || 'haiku' }}
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_SMTP_AUTH_CODE: ${{ secrets.QQ_SMTP_AUTH_CODE }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          CI: "true"
        run: bash scripts/run-all.sh --once
